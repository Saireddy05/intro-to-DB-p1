<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Database Quiz Challenge</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="background-blob"></div>
    <div class="background-blob second"></div>

    <div class="quiz-app">
        <!-- Start Card -->
        <div id="start-card" class="card active">
            <div class="icon">🚀</div>
            <h1>Introduction to Database part-1</h1>
            <p>Test your knowledge with our premium database fundamental quiz. Aim for perfection!</p>
            <button id="start-btn" class="primary-btn">Begin Assessment</button>
        </div>

        <!-- Quiz Card -->
        <div id="quiz-card" class="card">
            <div class="quiz-header">
                <div class="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div class="quiz-meta">
                    <span id="progress-text">Question 1 / 10</span>
                </div>
            </div>

            <h2 id="question">Loading Question...</h2>
            <div id="answers" class="answer-grid"></div>

            <div class="quiz-footer">
                <button id="next" class="primary-btn" style="display:none;">Next Question</button>
            </div>
        </div>

        <!-- Result Card -->
        <div id="result-card" class="card">
            <div id="result-icon" class="result-icon"></div>
            <h1 id="result-title">Quiz Complete!</h1>
            <div class="score-display">
                <span id="final-score">0</span><span id="total-questions">/ 10</span>
            </div>
            <p id="result-text"></p>
            <button id="retry" class="secondary-btn">Try Again</button>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
